<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tab for resting</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000000;
    color: #ffffff;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  .message-wrapper {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    letter-spacing: 0.05em;
    opacity: 0.9;
    transition: opacity 0.3s ease;
  }


<script>
  const messages = [
    "use watch, hung on corner of screen. it works perfect and keeps this screen free", 
  ];

  let lastIndex = -1;

  function showRandomMessage() {
    let randomIndex;
    do {
      randomIndex = Math.floor(Math.random() * messages.length);
    } while (randomIndex === lastIndex && messages.length > 1);

    lastIndex = randomIndex;

    const wrapper = document.querySelector(".message-wrapper");
    wrapper.style.opacity = 0;

    setTimeout(() => {
      document.getElementById("message").textContent = messages[randomIndex];
      wrapper.style.opacity = 0.9;
    }, 150);
  }

  showRandomMessage();
</script>
</body>
</html>
